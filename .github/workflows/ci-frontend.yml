name: Frontend — Build & Push

on:
  push:
    branches: [main]
    paths:
      - "frontend/ecommerce/**"
      - ".github/workflows/ci-frontend.yml"

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/trados-erp/frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Required for multi-platform builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/ecommerce/
          push: true
          platforms: linux/amd64,linux/arm64    # both Intel and Apple Silicon
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest